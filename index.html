<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>校園尋路慈大空間查詢平台</title>
    <link rel="icon" href="TCUMAP/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* --- 核心變數 --- */
        :root {
            --tech-blue: #007bff;
            --neon-glow: rgba(0, 123, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --bg-color: #f0f2f5;
            --text-main: #2c3e50;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --table-head: #f8fafc;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-main: #e2e8f0;
            --glass-bg: rgba(30, 30, 30, 0.9);
            --card-bg: #1e1e1e;
            --border-color: #333;
            --table-head: #252525;
            --neon-glow: rgba(255, 140, 0, 0.6);
            --tech-blue: #ff8400;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- 引導教學 CSS (Onboarding UI) --- */
        #tour-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; pointer-events: none;
        }

        .tour-spotlight {
            position: absolute; z-index: 10000;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        #tour-popover {
            position: absolute; z-index: 10001;
            width: 260px; background: var(--card-bg);
            border: 1px solid var(--tech-blue); border-radius: 12px;
            padding: 15px; pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        #tour-popover h3 { margin: 0 0 8px 0; color: var(--tech-blue); font-size: 1rem; }
        #tour-popover p { margin: 0 0 15px 0; font-size: 0.85rem; line-height: 1.5; }
        
        .tour-footer { display: flex; justify-content: space-between; align-items: center; }
        .tour-step-info { font-size: 0.75rem; color: #718096; }
        .tour-btn {
            padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-main); cursor: pointer;
            font-size: 0.8rem; font-weight: 600;
        }
        .tour-btn-next { background: var(--tech-blue); color: #fff; border: none; }

        /* --- 頁面樣式 --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .main-content-wrapper { max-width: 1200px; padding: 0 15px; margin: 15px auto; }

        .header-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; padding: 12px;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex-wrap: wrap; gap: 10px;
        }
        
        .header-bar h1 { 
            display: flex; align-items: center; gap: 10px; 
            font-size: 1.1rem; margin: 0; color: var(--text-main); letter-spacing: 0.5px; 
        }
        
        .header-logo { height: 32px; width: auto; object-fit: contain; }
        
        .stat-tag { 
            background: var(--card-bg); padding: 4px 10px; border-radius: 8px; 
            font-size: 0.75rem; border: 1px solid var(--border-color);
            color: var(--text-main); display: flex; align-items: center;
        }

        .icon-btn { 
            cursor: pointer; font-size: 1rem; width: 36px; height: 36px;
            border-radius: 50%; background: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }

        /* --- 搜尋列優化 --- */
        .search-bar { margin-bottom: 20px; display: flex; gap: 8px; flex-direction: column; }
        .search-bar input, .search-bar select { 
            width: 100%; box-sizing: border-box;
            padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); 
            background: var(--card-bg); color: var(--text-main); outline: none; font-size: 1rem;
        }
        
        .search-bar button { 
            padding: 12px; border-radius: 8px; border: none; 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white; cursor: pointer; font-weight: 600; font-size: 1rem;
        }

        /* --- 版本 1：手機卡片化 RWD --- */
        .table-container { width: 100%; background: transparent; border: none; }
        table { width: 100%; border-collapse: collapse; }

        /* 電腦版維持表格樣式 */
        @media (min-width: 769px) {
            .search-bar { flex-direction: row; }
            .search-bar input { flex: 2; }
            .search-bar select { flex: 1; }
            .header-bar h1 { font-size: 1.4rem; }
            .table-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
            th, td { text-align: center; padding: 15px 10px; border-bottom: 1px solid var(--border-color); }
            th { background: var(--table-head); font-weight: 600; color: #718096; }
        }

        /* 手機版轉換為卡片 */
        @media (max-width: 768px) {
            thead { display: none; } /* 隱藏表頭 */
            
            tr { 
                display: block; 
                background: var(--card-bg); 
                margin-bottom: 15px; 
                padding: 15px; 
                border-radius: 12px; 
                border: 1px solid var(--border-color);
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }

            td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center;
                padding: 8px 0; 
                border-bottom: 1px dashed var(--border-color);
                text-align: right;
                white-space: normal;
                font-size: 0.95rem;
            }

            td:last-child { border-bottom: none; }

            /* 顯示欄位名稱 */
            td::before { 
                content: attr(data-label); 
                font-weight: 600; 
                color: #718096; 
                margin-right: 15px;
                text-align: left;
                flex-shrink: 0;
            }

            .highlight-row { border: 2px solid var(--tech-blue); }
            
            .header-bar { justify-content: center; }
            .header-bar .controls { width: 100%; justify-content: center; display: flex; gap: 10px; }
        }

        a { color: var(--tech-blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="tour-overlay">
        <div class="tour-spotlight" id="tour-spotlight"></div>
        <div id="tour-popover">
            <h3 id="tour-title">標題</h3>
            <p id="tour-desc">內容說明</p>
            <div class="tour-footer">
                <span class="tour-step-info" id="tour-step-count">1/5</span>
                <div style="display:flex; gap:5px;">
                    <button class="tour-btn" id="tour-skip">跳過</button>
                    <button class="tour-btn tour-btn-next" id="tour-next">下一步</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content-wrapper">
        <div class="header-bar">
            <h1 id="ui-main-title">
                <img src="TCUMAP/logo.png" alt="Logo" class="header-logo">
                <span id="ui-main-title-text">校園尋路 <span style="color:var(--tech-blue)">慈大空間平台</span></span>
            </h1>
            <div class="controls" style="display: flex; gap: 8px; align-items: center;">
                <div id="tour-restart" class="icon-btn" title="Help">💡</div>
                <div id="lang-toggle" class="icon-btn" title="Language">EN</div>
                <div id="theme-toggle" class="icon-btn" title="Theme">
                    <span id="theme-icon">🌙</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px; width: 100%; justify-content: center; margin-top: 5px;">
                <div class="stat-tag"><span id="ui-online-label">在線</span>: <span id="online-count" style="color:var(--tech-blue); margin-left:4px;">1</span></div>
                <div class="stat-tag"><span id="ui-visit-label">造訪</span>: <span id="visit-total" style="margin-left:4px;">...</span></div>
            </div>
        </div>

        <div id="status" style="font-size: 0.75rem; color: #718096; margin-bottom: 8px; text-align: center;">SYSTEM READY</div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜尋關鍵字或編號..." />
            <div style="display: flex; gap: 8px;">
                <select id="campus-filter" style="flex: 1;"></select>
                <select id="building-filter" style="flex: 1;"></select>
            </div>
            <button id="search-btn">搜尋空間</button>
            <button id="reset-btn" style="display:none; background: #e53e3e;">重置搜尋</button>
        </div>

        <div class="table-container" id="table-container">
            <table id="space-table">
                <thead><tr id="table-head-row"></tr></thead>
                <tbody id="space-tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        // --- 語系字典 ---
        const I18N_DICT = {
            zh: { 
                mainTitle: '校園尋路 <span style="color:var(--tech-blue)">慈大空間平台</span>', 
                online: '在線', visit: '造訪', searchPlh: '搜尋關鍵字或編號...', 
                searchBtn: '搜尋空間', allCampus: '-- 所有校區 --', allBld: '-- 所有樓棟 --', 
                bldUnit: ' 棟', campusMap: { '1': '中央校區', '2': '介仁校區', '3': '建國校區' }, 
                colNames: { 'SpaceNo': '空間編號', 'SpaceName': '空間名稱', 'CampusNo': '校區', 'BuildingNo': '樓棟', 'FloorNo': '樓層', 'PicNo': '圖號' }, 
                floorUnit: ' 樓', systemReady: '系統就緒',
                tourNext: '下一步', tourSkip: '跳過', tourDone: '完成'
            },
            en: { 
                mainTitle: 'Campus Wayfinding <span style="color:var(--tech-blue)">TCU Map</span>', 
                online: 'Online', visit: 'Visits', searchPlh: 'Search ID...', 
                searchBtn: 'Search', allCampus: '-- All Campus --', allBld: '-- All Buildings --', 
                bldUnit: ' Bld', campusMap: { '1': 'Main Campus', '2': 'Jieren Campus', '3': 'Jianguo Campus' }, 
                colNames: { 'SpaceNo': 'Space ID', 'SpaceName': 'Name', 'CampusNo': 'Campus', 'BuildingNo': 'Building', 'FloorNo': 'Floor', 'PicNo': 'Pic ID' }, 
                floorUnit: 'F', systemReady: 'SYSTEM READY',
                tourNext: 'Next', tourSkip: 'Skip', tourDone: 'Finish'
            }
        };

        const Onboarding = {
            currentStep: 0, lang: 'zh',
            steps: {
                zh: [
                    { target: 'search-input', title: '快速搜尋', desc: '輸入編號（如 L0304）或關鍵字即可查找空間。' },
                    { target: 'campus-filter', title: '校區篩選', desc: '從此處切換不同校區。' },
                    { target: 'lang-toggle', title: '語言切換', desc: '在此處切換中英文介面。' }
                ],
                en: [
                    { target: 'search-input', title: 'Search', desc: 'Type Space ID or keywords.' },
                    { target: 'campus-filter', title: 'Campus', desc: 'Switch between campuses.' },
                    { target: 'lang-toggle', title: 'Language', desc: 'Toggle between EN and ZH.' }
                ]
            },
            init(lang) {
                this.lang = lang || 'zh';
                if (localStorage.getItem('tcu_tour_done') === 'true') return;
                document.getElementById('tour-overlay').style.display = 'block';
                this.render();
                if (!this.isBound) {
                    document.getElementById('tour-next').onclick = () => this.next();
                    document.getElementById('tour-skip').onclick = () => this.finish();
                    this.isBound = true;
                }
            },
            render() {
                if (document.getElementById('tour-overlay').style.display === 'none') return;
                const config = this.steps[this.lang];
                const step = config[this.currentStep];
                const dict = I18N_DICT[this.lang];
                const targetEl = document.getElementById(step.target);
                if (!targetEl) return this.next();

                document.getElementById('tour-title').innerText = step.title;
                document.getElementById('tour-desc').innerText = step.desc;
                document.getElementById('tour-step-count').innerText = `${this.currentStep + 1} / ${config.length}`;
                document.getElementById('tour-next').innerText = (this.currentStep === config.length - 1) ? dict.tourDone : dict.tourNext;
                document.getElementById('tour-skip').innerText = dict.tourSkip;

                const rect = targetEl.getBoundingClientRect();
                const spotlight = document.getElementById('tour-spotlight');
                const popover = document.getElementById('tour-popover');
                
                spotlight.style.width = `${rect.width + 10}px`;
                spotlight.style.height = `${rect.height + 10}px`;
                spotlight.style.left = `${rect.left - 5}px`;
                spotlight.style.top = `${rect.top - 5}px`;

                popover.style.left = `${Math.min(window.innerWidth - 280, Math.max(20, rect.left))}px`;
                popover.style.top = `${rect.bottom + 15}px`;
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            },
            next() {
                const config = this.steps[this.lang];
                if (this.currentStep < config.length - 1) { this.currentStep++; this.render(); } 
                else { this.finish(); }
            },
            finish() {
                document.getElementById('tour-overlay').style.display = 'none';
                localStorage.setItem('tcu_tour_done', 'true');
                this.currentStep = 0;
            }
        };

        const Tracker = {
            getSessionID() {
                let id = localStorage.getItem('tcu_user_id');
                if (!id) { id = 'user_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('tcu_user_id', id); }
                return id;
            },
            async log(action, details = "") {
                try {
                    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    await client.from("user_activity_logs").insert({
                        user_session_id: this.getSessionID(), action_type: action, details: details, 
                        event_time_tw: new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})
                    });
                } catch (e) { }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const BUILDING_NAMES_I18N = {
                zh: { "1": { "A": "和敬樓 A", "B": "和敬樓 B", "C": "和敬樓 C", "D": "勤耕樓 D", "E": "勤耕樓 E", "F": "大捨樓 F", "H": "福田樓 H", "L": "大愛樓 L", "T": "大喜館 T" }, "2": { "A": "合心樓 2A", "B": "文心樓 2B", "C": "立心樓 2C", "D": "知心樓 2D", "E": "明心樓 2E", "G": "體育館 2G", "H": "活動中心 2H" } },
                en: { "1": { "A": "Hejing A", "B": "Hejing B", "C": "Hejing C", "D": "Qingeng D", "E": "Qingeng E", "F": "Dashe F", "H": "Futian H", "L": "Daai L", "T": "Daxi T" }, "2": { "A": "Hexin 2A", "B": "Wenxin 2B", "C": "Lixin 2C", "D": "Zhixin 2D", "E": "Mingxin 2E", "G": "Gym 2G", "H": "Activity 2H" } }
            };

            const app = {
                supabase: null, currentData: [], highlightID: null, sortCol: 'SpaceNo', sortDir: 1,
                lang: localStorage.getItem('lang') || 'zh',

                async init() {
                    this.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    this.setupTheme(); 
                    this.setupLanguage();
                    this.setupOnlinePresence();
                    this.setupStats();
                    this.bindEvents();
                    this.loadFromURL();
                    Tracker.log("ENTER", "HOME");
                    setTimeout(() => Onboarding.init(this.lang), 800);
                },

                setupTheme() {
                    const body = document.body;
                    const updateUI = (isDark) => {
                        body.classList.toggle('dark-mode', isDark);
                        document.getElementById('theme-icon').textContent = isDark ? '🔆' : '🌙';
                    };
                    if (localStorage.getItem('theme') === 'dark') updateUI(true);
                    document.getElementById('theme-toggle')?.addEventListener('click', () => {
                        const isNowDark = !body.classList.contains('dark-mode');
                        updateUI(isNowDark);
                        localStorage.setItem('theme', isNowDark ? 'dark' : 'light');
                    });
                },

                setupLanguage() {
                    const updateUI = () => {
                        const dict = I18N_DICT[this.lang];
                        document.getElementById('ui-main-title-text').innerHTML = dict.mainTitle;
                        document.getElementById('ui-online-label').textContent = dict.online;
                        document.getElementById('ui-visit-label').textContent = dict.visit;
                        document.getElementById('status').textContent = dict.systemReady;
                        document.getElementById('search-input').placeholder = dict.searchPlh;
                        document.getElementById('search-btn').textContent = dict.searchBtn;
                        document.getElementById('lang-toggle').textContent = this.lang === 'zh' ? 'EN' : '中文';
                        this.renderFilters();
                        if (this.currentData.length > 0) this.sortAndRender();
                        Onboarding.lang = this.lang;
                    };
                    document.getElementById('lang-toggle')?.addEventListener('click', () => {
                        this.lang = this.lang === 'zh' ? 'en' : 'zh';
                        localStorage.setItem('lang', this.lang);
                        updateUI();
                    });
                    updateUI();
                },

                bindEvents() {
                    const search = () => { this.fetchData(document.getElementById('search-input').value); };
                    document.getElementById('search-btn')?.addEventListener('click', search);
                    document.getElementById('search-input')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
                    document.getElementById('reset-btn')?.addEventListener('click', () => { window.location.href = window.location.pathname; });
                    document.getElementById("table-head-row")?.addEventListener('click', (e) => {
                        const th = e.target.closest('th');
                        if (th) {
                            this.sortDir = (this.sortCol === th.dataset.col) ? this.sortDir * -1 : 1;
                            this.sortCol = th.dataset.col;
                            this.sortAndRender();
                        }
                    });
                    document.getElementById('tour-restart')?.addEventListener('click', () => {
                        localStorage.removeItem('tcu_tour_done');
                        Onboarding.currentStep = 0; Onboarding.init(this.lang);
                    });
                },

                async fetchData(kw = "", hID = null) {
                    const camp = document.getElementById('campus-filter').value, bld = document.getElementById('building-filter').value;
                    let q = this.supabase.from("TblSpace").select('*');
                    if (kw) q = q.or(`SpaceName.ilike.%${kw}%,SpaceNo.ilike.%${kw}%`);
                    if (camp) q = q.eq('CampusNo', camp);
                    if (bld) q = q.or(`BuildingNo.eq.${bld},BuildingNo.eq.2${bld}`);
                    const { data } = await q.limit(500);
                    this.currentData = data || [];
                    if (hID) this.highlightID = String(hID);
                    this.sortAndRender();
                },

                sortAndRender() {
                    const p = this.currentData.filter(r => String(r.sID) === this.highlightID);
                    const o = this.currentData.filter(r => String(r.sID) !== this.highlightID);
                    const colKeys = ['SpaceNo', 'SpaceName', 'CampusNo', 'BuildingNo', 'FloorNo', 'PicNo'];
                    o.sort((a, b) => String(a[this.sortCol] || "").localeCompare(String(b[this.sortCol] || ""), undefined, { numeric: true }) * this.sortDir);
                    this.currentData = [...p, ...o];
                    const dict = I18N_DICT[this.lang];
                    
                    document.getElementById("table-head-row").innerHTML = colKeys.map(c => `<th data-col="${c}">${dict.colNames[c]}</th>`).join('');
                    
                    const rows = this.currentData.map(row => {
                        const isP = String(row.sID) === this.highlightID;
                        const rowCells = colKeys.map(c => {
                            let v = row[c] ?? "";
                            const label = dict.colNames[c]; // 用於手機版顯示標籤
                            if (c === 'CampusNo') v = dict.campusMap[v] || v;
                            if (c === 'BuildingNo') {
                                const m = BUILDING_NAMES_I18N[this.lang][row.CampusNo];
                                v = m ? (m[v] || m[v.replace(/^2/,'')] || `${v}${dict.bldUnit}`) : (v ? `${v}${dict.bldUnit}` : "");
                            }
                            if (c === 'FloorNo' && v) v = `${v}${dict.floorUnit}`;
                            if (c === 'SpaceName' && row.PicNo) {
                                return `<td data-label="${label}"><a href="Details.html?sID=${row.sID}&keyword=${encodeURIComponent(document.getElementById('search-input').value)}">${v}</a></td>`;
                            }
                            return `<td data-label="${label}">${v}</td>`;
                        }).join('');
                        return `<tr class="${isP ? 'highlight-row' : ''}">${rowCells}</tr>`;
                    }).join('');
                    
                    document.getElementById("space-tbody").innerHTML = rows;
                    document.getElementById('reset-btn').style.display = 'inline-block';
                },

                setupOnlinePresence() {
                    const channel = this.supabase.channel('online-users', { config: { presence: { key: 'u-' + Math.random().toString(36).substr(2, 5) } } });
                    channel.on('presence', { event: 'sync' }, () => {
                        const countEl = document.getElementById('online-count');
                        if (countEl) countEl.textContent = Object.keys(channel.presenceState()).length;
                    }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() }); });
                },

                async setupStats() {
                    try {
                        const { count } = await this.supabase.from('daily_page_views').select('*', { count: 'exact', head: true });
                        document.getElementById('visit-total').textContent = count || 0;
                    } catch (e) { }
                },

                renderFilters() {
                    const dict = I18N_DICT[this.lang];
                    let c = `<option value="">${dict.allCampus}</option>`;
                    Object.entries(dict.campusMap).forEach(([k, v]) => c += `<option value="${k}">${v}</option>`);
                    document.getElementById('campus-filter').innerHTML = c;
                    let b = `<option value="">${dict.allBld}</option>`;
                    ['A','B','C','D','E','F','G','H','L','T'].forEach(char => b += `<option value="${char}">${char}${dict.bldUnit}</option>`);
                    document.getElementById('building-filter').innerHTML = b;
                },

                loadFromURL() {
                    const p = new URLSearchParams(window.location.search);
                    if (p.get('keyword')) {
                        document.getElementById('search-input').value = p.get('keyword');
                        this.fetchData(p.get('keyword'), p.get('highlightID'));
                    }
                }
            };
            app.init();
        });
    </script>
</body>
</html>
