<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <title>校園尋路慈大空間查詢平台</title>
    <link rel="icon" href="TCUMAP/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* --- 核心變數 --- */
        :root {
            --tech-blue: #007bff;
            --neon-glow: rgba(0, 123, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --bg-color: #f0f2f5;
            --text-main: #2c3e50;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --table-head: #f8fafc;
            --sort-icon-color: #cbd5e0; /* 未排序圖示顏色 */
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-main: #e2e8f0;
            --glass-bg: rgba(30, 30, 30, 0.9);
            --card-bg: #1e1e1e;
            --border-color: #333;
            --table-head: #252525;
            --tech-blue: #ff8400;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- 頁面通用樣式 --- */
        .main-content-wrapper { max-width: 1200px; padding: 0 20px; margin: 20px auto; }

        .header-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 15px;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-bar h1 { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; margin: 0; }
        .header-logo { height: 40px; width: auto; }
        
        .stat-tag { background: var(--card-bg); padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--border-color); }
        .icon-btn { cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        .search-bar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-bar input, .search-bar select { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); flex: 1; min-width: 150px; }
        .search-bar button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--tech-blue); color: white; cursor: pointer; font-weight: 600; }

        /* --- 表格樣式 --- */
        .table-container { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { text-align: center; padding: 15px 10px; border-bottom: 1px solid var(--border-color); }
        th { background: var(--table-head); cursor: pointer; font-weight: 600; color: #718096; position: relative; user-select: none; }
        th:hover { background: rgba(0,0,0,0.02); }

        /* --- 排序圖示 CSS --- */
        .sort-wrapper { display: inline-flex; flex-direction: column; vertical-align: middle; margin-left: 5px; font-size: 8px; line-height: 1; }
        .sort-up, .sort-down { color: var(--sort-icon-color); transition: color 0.2s; }
        th.sort-asc .sort-up { color: var(--tech-blue); }
        th.sort-desc .sort-down { color: var(--tech-blue); }

        .highlight-row { background: rgba(0, 123, 255, 0.08) !important; font-weight: bold; border-left: 4px solid var(--tech-blue); }
        a { color: var(--tech-blue); text-decoration: none; font-weight: 600; }

        /* --- 手機卡片式轉換 (RWD) --- */
        @media screen and (max-width: 768px) {
            .header-bar { flex-direction: column; align-items: flex-start; gap: 15px; }
            .search-bar { flex-direction: column; }
            .search-bar input, .search-bar select, .search-bar button { width: 100%; margin-bottom: 5px; }

            .table-container { border: none; background: transparent; }
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            tr {
                margin-bottom: 15px; background: var(--card-bg);
                border-radius: 12px; border: 1px solid var(--border-color);
                box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 5px 0;
            }

            td {
                text-align: left; padding: 12px 15px; border: none;
                border-bottom: 1px dotted var(--border-color);
                position: relative; padding-left: 40%; min-height: 40px;
                display: flex; align-items: center; white-space: normal;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label);
                position: absolute; left: 15px; width: 35%;
                font-weight: 700; color: var(--tech-blue); font-size: 0.8rem;
            }
        }
        
        /* 引導教學樣式 (略) */
        #tour-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; pointer-events: none; }
        .tour-spotlight { position: absolute; z-index: 10000; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6); transition: all 0.3s ease; pointer-events: none; }
        #tour-popover { position: absolute; z-index: 10001; width: 260px; background: var(--card-bg); border-radius: 12px; padding: 20px; pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="tour-overlay">
        <div class="tour-spotlight" id="tour-spotlight"></div>
        <div id="tour-popover">
            <h3 id="tour-title"></h3><p id="tour-desc"></p>
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <span id="tour-step-count" style="font-size:0.8rem; color:#888;"></span>
                <button id="tour-next" style="background:var(--tech-blue); color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Next</button>
            </div>
        </div>
    </div>

    <div class="main-content-wrapper">
        <div class="header-bar">
            <h1 id="ui-main-title">
                <img src="TCUMAP/logo.png" alt="Logo" class="header-logo">
                <span id="ui-main-title-text">校園尋路 <span style="color:var(--tech-blue)">慈大空間查詢平台</span></span>
            </h1>
            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <div id="tour-restart" class="icon-btn">💡</div>
                <div id="lang-toggle" class="icon-btn">EN</div>
                <div id="theme-toggle" class="icon-btn"><span id="theme-icon">🌙</span></div>
                <div class="stat-tag"><span id="ui-online-label">在線</span>: <span id="online-count" style="color:var(--tech-blue); font-weight:bold;">1</span></div>
                <div class="stat-tag"><span id="ui-visit-label">瀏覽</span>: <span id="visit-total">...</span></div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜尋..." />
            <select id="campus-filter"></select>
            <select id="building-filter"></select>
            <button id="search-btn">搜尋</button>
            <button id="reset-btn" style="display:none; background:#e53e3e; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">RESET</button>
        </div>

        <div id="status" style="font-size: 0.75rem; color: #888; margin-bottom: 10px;">READY</div>

        <div class="table-container">
            <table id="space-table">
                <thead><tr id="table-head-row"></tr></thead>
                <tbody id="space-tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const I18N_DICT = {
            zh: { 
                mainTitle: '校園尋路 <span style="color:var(--tech-blue)">慈大空間查詢平台</span>', 
                online: '在線', visit: '瀏覽', searchPlh: '搜尋關鍵字或編號...', 
                searchBtn: '搜尋空間', allCampus: '-- 所有校區 --', allBld: '-- 所有樓棟 --', 
                bldUnit: ' 棟', campusMap: { '1': '中央校區', '2': '介仁校區', '3': '建國校區' }, 
                colNames: { 'SpaceNo': '空間編號', 'SpaceName': '空間名稱', 'CampusNo': '校區', 'BuildingNo': '樓棟', 'FloorNo': '樓層', 'PicNo': '圖號' }, 
                floorUnit: ' 樓', ready: '系統就緒'
            },
            en: { 
                mainTitle: 'Campus Wayfinding <span style="color:var(--tech-blue)">TCU Map</span>', 
                online: 'Online', visit: 'Visits', searchPlh: 'Search ID or keywords...', 
                searchBtn: 'Search', allCampus: '-- All Campus --', allBld: '-- All Buildings --', 
                bldUnit: ' Bld', campusMap: { '1': 'Main Campus', '2': 'Jieren Campus', '3': 'Jianguo Campus' }, 
                colNames: { 'SpaceNo': 'Space ID', 'SpaceName': 'Name', 'CampusNo': 'Campus', 'BuildingNo': 'Building', 'FloorNo': 'Floor', 'PicNo': 'Pic ID' }, 
                floorUnit: 'F', ready: 'SYSTEM READY'
            }
        };

        const app = {
            supabase: null, currentData: [], sortCol: 'SpaceNo', sortDir: 1,
            lang: localStorage.getItem('lang') || 'zh',

            async init() {
                this.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                this.setupTheme(); 
                this.setupLanguage();
                this.bindEvents();
                // 預設加載：一進網頁不論有沒有搜尋，都先抓一次資料
                const p = new URLSearchParams(window.location.search);
                this.fetchData(p.get('keyword') || "", p.get('highlightID'));
                
                this.setupOnlinePresence();
                this.setupStats();
            },

            setupTheme() {
                const body = document.body;
                const update = (dark) => {
                    body.classList.toggle('dark-mode', dark);
                    document.getElementById('theme-icon').textContent = dark ? '🔆' : '🌙';
                };
                if (localStorage.getItem('theme') === 'dark') update(true);
                document.getElementById('theme-toggle').onclick = () => {
                    const isDark = !body.classList.contains('dark-mode');
                    update(isDark);
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                };
            },

            setupLanguage() {
                const btn = document.getElementById('lang-toggle');
                const update = () => {
                    const dict = I18N_DICT[this.lang];
                    document.getElementById('ui-main-title-text').innerHTML = dict.mainTitle;
                    document.getElementById('search-input').placeholder = dict.searchPlh;
                    document.getElementById('search-btn').textContent = dict.searchBtn;
                    document.getElementById('status').textContent = dict.ready;
                    btn.textContent = this.lang === 'zh' ? 'EN' : '中文';
                    this.renderFilters();
                    this.sortAndRender();
                };
                btn.onclick = () => {
                    this.lang = this.lang === 'zh' ? 'en' : 'zh';
                    localStorage.setItem('lang', this.lang);
                    update();
                };
                update();
            },

            bindEvents() {
                const triggerSearch = () => this.fetchData(document.getElementById('search-input').value);
                document.getElementById('search-btn').onclick = triggerSearch;
                document.getElementById('search-input').onkeypress = (e) => { if(e.key==='Enter') triggerSearch(); };
                
                document.getElementById('table-head-row').onclick = (e) => {
                    const th = e.target.closest('th');
                    if (th) {
                        const col = th.dataset.col;
                        this.sortDir = (this.sortCol === col) ? this.sortDir * -1 : 1;
                        this.sortCol = col;
                        this.sortAndRender();
                    }
                };
            },

            async fetchData(kw = "", hID = null) {
                document.getElementById('status').textContent = "LOADING...";
                let q = this.supabase.from("TblSpace").select('*');
                if (kw) q = q.or(`SpaceName.ilike.%${kw}%,SpaceNo.ilike.%${kw}%`);
                
                const camp = document.getElementById('campus-filter').value;
                const bld = document.getElementById('building-filter').value;
                if (camp) q = q.eq('CampusNo', camp);
                if (bld) q = q.or(`BuildingNo.eq.${bld},BuildingNo.eq.2${bld}`);
                
                const { data } = await q.limit(200).order('SpaceNo', { ascending: true });
                this.currentData = data || [];
                this.highlightID = hID;
                this.sortAndRender();
                document.getElementById('status').textContent = I18N_DICT[this.lang].ready;
            },

            sortAndRender() {
                const dict = I18N_DICT[this.lang];
                const colKeys = ['SpaceNo', 'SpaceName', 'CampusNo', 'BuildingNo', 'FloorNo', 'PicNo'];
                
                // 排序邏輯
                this.currentData.sort((a, b) => {
                    let valA = String(a[this.sortCol] || "");
                    let valB = String(b[this.sortCol] || "");
                    return valA.localeCompare(valB, undefined, {numeric: true}) * this.sortDir;
                });

                // 繪製表頭 (包含三角形排序圖示)
                const headerHTML = colKeys.map(key => {
                    let sortClass = "";
                    if (this.sortCol === key) {
                        sortClass = this.sortDir === 1 ? "sort-asc" : "sort-desc";
                    }
                    return `
                        <th data-col="${key}" class="${sortClass}">
                            ${dict.colNames[key]}
                            <span class="sort-wrapper">
                                <span class="sort-up">▲</span>
                                <span class="sort-down">▼</span>
                            </span>
                        </th>`;
                }).join('');
                document.getElementById('table-head-row').innerHTML = headerHTML;

                // 繪製內容
                const bodyHTML = this.currentData.map(row => {
                    const isHighlight = String(row.sID) === String(this.highlightID);
                    const cells = colKeys.map(key => {
                        let val = row[key] ?? "";
                        const label = dict.colNames[key];
                        
                        if (key === 'CampusNo') val = dict.campusMap[val] || val;
                        if (key === 'FloorNo' && val) val = val + dict.floorUnit;
                        
                        // 連結處理
                        if (key === 'SpaceName' && row.PicNo) {
                            val = `<a href="Details.html?sID=${row.sID}">${val}</a>`;
                        }
                        
                        return `<td data-label="${label}">${val}</td>`;
                    }).join('');
                    return `<tr class="${isHighlight ? 'highlight-row' : ''}">${cells}</tr>`;
                }).join('');
                document.getElementById('space-tbody').innerHTML = bodyHTML;
            },

            renderFilters() {
                const dict = I18N_DICT[this.lang];
                let c = `<option value="">${dict.allCampus}</option>`;
                Object.entries(dict.campusMap).forEach(([k,v]) => c+=`<option value="${k}">${v}</option>`);
                document.getElementById('campus-filter').innerHTML = c;
                
                let b = `<option value="">${dict.allBld}</option>`;
                "ABCDEFHLT".split('').forEach(char => b+=`<option value="${char}">${char}${dict.bldUnit}</option>`);
                document.getElementById('building-filter').innerHTML = b;
            },

            async setupStats() { /* 統計邏輯同前，略 */ },
            setupOnlinePresence() { /* 在線人數邏輯同前，略 */ }
        };

        app.init();
    </script>
</body>
</html>
